<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* =====================================================================
     DESIGN TOKENS
     ===================================================================== */
  :root {
    --bg: #FAF8F4;
    --surface: #FFFFFF;
    --charcoal: #2B2B28;
    --muted: #8A877E;
    --line: #E8E4DC;
    --clay: #C1654A;
    --clay-soft: #F6E8E2;
    --teal: #3E7C77;
    --teal-soft: #E4EFEE;
    --slate: #5B6B8A;
    --slate-soft: #E8EBF2;
    --grey-soft: #F0EEE8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Albert Sans', sans-serif;
    background: var(--bg);
    color: var(--charcoal);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 48px 24px;
  }

  .app { width: 100%; max-width: 720px; }

  button { font-family: inherit; cursor: pointer; }
  input { font-family: inherit; }
  button:focus-visible, input:focus-visible {
    outline: 2px solid var(--slate);
    outline-offset: 2px;
  }
  ul { list-style: none; }

  /* =====================================================================
     HEADER & SCOPE
     ===================================================================== */
  header { margin-bottom: 20px; }

  .eyebrow {
    font-size: 12px; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--teal); margin-bottom: 8px;
  }

  h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.01em; }
  .count { font-size: 14px; color: var(--muted); margin-top: 6px; }
  .count .overdue-note { color: var(--clay); font-weight: 600; }

  .scope {
    display: inline-flex; background: var(--surface);
    border: 1px solid var(--line); border-radius: 999px;
    padding: 3px; margin-bottom: 20px; gap: 2px;
  }

  .scope button {
    font-size: 13px; font-weight: 600; padding: 8px 18px;
    border: none; border-radius: 999px; background: transparent;
    color: var(--muted); transition: all 0.15s;
  }

  .scope button.active-work { background: var(--slate); color: #fff; }
  .scope button.active-private { background: var(--clay); color: #fff; }
  .scope button.active-both { background: var(--charcoal); color: #fff; }

  /* =====================================================================
     COMPOSER
     ===================================================================== */
  .composer {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 14px; padding: 12px; margin-bottom: 20px;
  }

  .input-row { display: flex; gap: 10px; }

  .input-row input {
    flex: 1; min-width: 0; font-size: 16px; padding: 12px 14px;
    border: 1px solid var(--line); border-radius: 10px;
    background: var(--bg); color: var(--charcoal); outline: none;
    transition: border-color 0.15s;
  }

  .input-row input:focus { border-color: var(--teal); }
  .input-row input::placeholder { color: var(--muted); }

  .input-row > button {
    font-size: 15px; font-weight: 600; padding: 0 22px;
    border: none; border-radius: 10px; background: var(--charcoal);
    color: #fff; transition: background 0.15s;
  }

  .input-row > button:hover { background: #45453f; }

  .composer-flags {
    display: flex; align-items: center; gap: 6px;
    margin-top: 10px; flex-wrap: wrap;
  }

  .composer-flags .sep { width: 1px; height: 18px; background: var(--line); margin: 0 4px; }

  .composer-target {
    font-size: 12px; font-weight: 600; color: var(--muted); margin-left: auto;
  }

  /* =====================================================================
     CHIPS (flags)
     ===================================================================== */
  .flag {
    font-size: 12px; font-weight: 600; letter-spacing: 0.04em;
    padding: 7px 14px; border-radius: 999px;
    border: 1px solid var(--line); background: transparent;
    color: var(--muted); transition: all 0.15s;
    display: inline-flex; align-items: center; gap: 5px;
  }

  .flag.u.on { background: var(--clay-soft); border-color: var(--clay); color: var(--clay); }
  .flag.i.on { background: var(--teal-soft); border-color: var(--teal); color: var(--teal); }
  .flag.f.on { background: var(--slate-soft); border-color: var(--slate); color: var(--slate); }
  .flag.f.overdue { background: var(--clay-soft); border-color: var(--clay); color: var(--clay); }
  .flag.f.today { background: var(--teal-soft); border-color: var(--teal); color: var(--teal); }
  .flag.cw.on { background: var(--slate); border-color: var(--slate); color: #fff; }
  .flag.cp.on { background: var(--clay); border-color: var(--clay); color: #fff; }
  .flag.st.on { background: var(--charcoal); border-color: var(--charcoal); color: #fff; }
  .flag.sc.on { background: var(--grey-soft); border-color: var(--muted); color: var(--charcoal); }
  .flag.sc.complete { background: var(--teal-soft); border-color: var(--teal); color: var(--teal); }

  /* =====================================================================
     FOLLOW-UP EDITOR
     ===================================================================== */
  .date-pop { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  .mode-toggle { display: flex; gap: 4px; }

  .mode-toggle button {
    font-size: 12px; font-weight: 600; padding: 6px 12px;
    border: 1px solid var(--line); border-radius: 999px;
    background: transparent; color: var(--muted); transition: all 0.15s;
  }

  .mode-toggle button.active { background: var(--slate); border-color: var(--slate); color: #fff; }

  .date-pop input[type="date"], .date-pop input[type="time"] {
    font-size: 14px; padding: 6px 9px;
    border: 1px solid var(--line); border-radius: 8px;
    background: var(--surface); color: var(--charcoal);
  }

  .date-pop .clear-date {
    font-size: 12px; border: none; background: none;
    color: var(--muted); padding: 6px 4px;
  }

  .date-pop .clear-date:hover { color: var(--clay); }

  .quick-dates { display: flex; gap: 5px; flex-wrap: wrap; }

  .quick-dates button {
    font-size: 12px; font-weight: 500; padding: 6px 11px;
    border: 1px solid var(--line); border-radius: 999px;
    background: var(--surface); color: var(--charcoal); transition: all 0.15s;
  }

  .quick-dates button:hover { border-color: var(--slate); }
  .quick-dates button small { color: var(--muted); font-weight: 400; margin-left: 4px; }

  /* =====================================================================
     TOOLBAR (views + filters)
     ===================================================================== */
  .toolbar {
    display: flex; justify-content: space-between; align-items: center;
    gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
  }

  .pills { display: flex; gap: 6px; flex-wrap: wrap; }

  .pills button {
    font-size: 13px; font-weight: 500; padding: 8px 16px; min-height: 36px;
    border: 1px solid var(--line); border-radius: 999px;
    background: transparent; color: var(--muted); transition: all 0.15s;
  }

  .pills button.active { background: var(--charcoal); border-color: var(--charcoal); color: #fff; }

  .pills button .dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: var(--clay); margin-left: 6px; vertical-align: 1px;
  }

  /* =====================================================================
     TASK ROWS (shared by list, follow-ups, matrix)
     ===================================================================== */
  .tasks { display: flex; flex-direction: column; gap: 8px; }

  .task {
    display: flex; align-items: center; gap: 12px; padding: 12px 14px;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 12px; border-left-width: 4px;
    transition: border-color 0.15s; flex-wrap: wrap;
  }

  .task.compact { padding: 8px 10px; border-radius: 9px; font-size: 14px; gap: 8px; }

  .task.ctx-work { border-left-color: var(--slate); }
  .task.ctx-private { border-left-color: var(--clay); }
  .task:hover { border-color: var(--slate); }
  .task.ctx-private:hover { border-color: var(--clay); }

  .ctx-tag {
    font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; padding: 3px 8px; border-radius: 999px;
    flex-shrink: 0;
  }

  .ctx-tag.w { background: var(--slate-soft); color: var(--slate); }
  .ctx-tag.p { background: var(--clay-soft); color: var(--clay); }

  .check {
    width: 22px; height: 22px; border: 2px solid var(--line);
    border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: none; padding: 0; transition: all 0.15s;
  }

  .task.compact .check { width: 18px; height: 18px; }
  .done > .check { background: var(--teal); border-color: var(--teal); }
  .check svg { opacity: 0; transition: opacity 0.15s; }
  .done > .check svg { opacity: 1; }

  .task .text { flex: 1; font-size: 15px; min-width: 0; overflow-wrap: break-word; }
  .task.compact .text { font-size: 14px; }
  .task.done .text { color: var(--muted); text-decoration: line-through; }

  .flags { display: flex; gap: 5px; flex-shrink: 0; flex-wrap: wrap; }
  .flags .flag { font-size: 11px; padding: 5px 10px; }
  .task.compact .flag.f { font-size: 10px; padding: 4px 8px; }

  .del {
    border: none; background: none; color: var(--muted);
    font-size: 18px; line-height: 1; padding: 4px 6px;
    border-radius: 6px; opacity: 0; transition: opacity 0.15s, color 0.15s;
  }

  .task:hover .del, .r-card:hover .del, .sub-row:hover .del,
  .del:focus-visible { opacity: 1; }
  .del:hover { color: var(--clay); }

  .task .date-pop { width: 100%; padding-left: 34px; }

  .edit-input {
    flex: 1; min-width: 0; font-size: 15px; padding: 6px 10px;
    border: 1px solid var(--teal); border-radius: 8px;
    background: var(--bg); color: var(--charcoal); outline: none;
  }

  /* =====================================================================
     SUBTASKS
     ===================================================================== */
  .sub-panel { width: 100%; padding-left: 34px; }

  .sub-row {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 0; border-top: 1px dashed var(--line);
  }

  .sub-row .check { width: 18px; height: 18px; }
  .sub-row .text { font-size: 14px; flex: 1; min-width: 0; overflow-wrap: break-word; }
  .sub-row.done .text { color: var(--muted); text-decoration: line-through; }

  .sub-add { display: flex; gap: 8px; padding: 8px 0 2px; }

  .sub-add input {
    flex: 1; min-width: 0; font-size: 14px; padding: 8px 11px;
    border: 1px solid var(--line); border-radius: 9px;
    background: var(--bg); outline: none;
  }

  .sub-add input:focus { border-color: var(--teal); }

  .sub-add button {
    font-size: 13px; font-weight: 600; padding: 8px 14px;
    border: none; border-radius: 9px; background: var(--charcoal); color: #fff;
  }

  /* =====================================================================
     NOTES
     ===================================================================== */
  .flag.nt.on { background: var(--grey-soft); border-color: var(--muted); color: var(--charcoal); }

  .note-panel { width: 100%; padding-left: 34px; position: relative; }

  .note-box {
    width: 100%;
    font-family: inherit;
    font-size: 14px;
    line-height: 1.5;
    padding: 9px 11px 22px;
    border: 1px solid var(--line);
    border-radius: 9px;
    background: var(--bg);
    color: var(--charcoal);
    outline: none;
    resize: vertical;
  }

  .note-box:focus { border-color: var(--teal); }

  .note-count {
    position: absolute;
    right: 10px;
    bottom: 8px;
    font-size: 11px;
    color: var(--muted);
    pointer-events: none;
  }

  .note-count.full { color: var(--clay); font-weight: 600; }

  /* =====================================================================
     MATRIX VIEW
     ===================================================================== */
  .matrix { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .quadrant {
    border-radius: 14px; padding: 16px; min-height: 140px;
    border: 2px solid transparent; transition: border-color 0.15s;
  }

  .quadrant.q-do { background: var(--clay-soft); }
  .quadrant.q-schedule { background: var(--teal-soft); }
  .quadrant.q-delegate { background: var(--slate-soft); }
  .quadrant.q-eliminate { background: var(--grey-soft); }
  .drop-target { border-color: var(--charcoal) !important; }

  .q-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .q-do .q-title { color: var(--clay); }
  .q-schedule .q-title { color: var(--teal); }
  .q-delegate .q-title { color: var(--slate); }
  .q-eliminate .q-title { color: var(--muted); }

  .q-sub { font-size: 11px; color: var(--muted); margin-bottom: 12px; }

  .quadrant .task { background: var(--surface); border-color: transparent; margin-bottom: 6px; }
  .quadrant .task.ctx-work { border-left-color: var(--slate); }
  .quadrant .task.ctx-private { border-left-color: var(--clay); }

  .grip {
    border: none; background: none; color: var(--muted);
    cursor: grab; padding: 6px 4px; margin: -6px 0;
    flex-shrink: 0; border-radius: 6px; touch-action: none;
    display: flex; align-items: center;
  }

  .grip:active { cursor: grabbing; }

  .zone-empty { font-size: 13px; color: var(--muted); font-style: italic; }

  .unsorted { margin-top: 20px; }
  .unsorted h2 { font-size: 14px; font-weight: 600; color: var(--muted); margin-bottom: 10px; }

  .drag-ghost {
    position: fixed; z-index: 100; pointer-events: none;
    background: var(--surface); border: 1px solid var(--slate);
    border-radius: 9px; padding: 8px 14px; font-size: 14px;
    box-shadow: 0 6px 20px rgba(43,43,40,0.15);
    max-width: 260px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .dragging-source { opacity: 0.35; }

  /* =====================================================================
     FOLLOW-UPS VIEW
     ===================================================================== */
  .fu-group { margin-bottom: 24px; }
  .fu-group h2 {
    font-size: 13px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; margin-bottom: 10px; color: var(--muted);
  }
  .fu-group.overdue h2 { color: var(--clay); }
  .fu-group.today h2 { color: var(--teal); }
  .fu-group.nudge h2 { color: var(--slate); }
  .fu-note { font-size: 13px; color: var(--muted); margin: -4px 0 10px; }

  /* =====================================================================
     RADAR VIEW
     ===================================================================== */
  .radar-summary { font-size: 13px; color: var(--muted); margin-bottom: 16px; }

  .stage-zone {
    border: 2px dashed var(--line); border-radius: 14px;
    padding: 14px; margin-bottom: 14px; transition: border-color 0.15s;
  }

  .stage-zone h2 { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
  .stage-sub { font-size: 12px; color: var(--muted); margin-bottom: 12px; }

  .r-card {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface); border: 1px solid var(--line);
    border-left-width: 4px; border-radius: 11px;
    padding: 11px 13px; margin-bottom: 8px; flex-wrap: wrap;
    transition: opacity 0.2s;
  }

  .r-card.ctx-work { border-left-color: var(--slate); }
  .r-card.ctx-private { border-left-color: var(--clay); }
  .r-card.aging { opacity: 0.85; }
  .r-card.stale { opacity: 0.65; }

  .r-card .text { flex: 1; font-size: 15px; min-width: 0; overflow-wrap: break-word; }

  .r-age { font-size: 12px; color: var(--muted); flex-shrink: 0; }
  .r-card.stale .r-age { color: var(--clay); font-weight: 600; }

  .r-actions { display: flex; gap: 5px; flex-shrink: 0; align-items: center; }

  .r-btn {
    font-size: 11px; font-weight: 600; letter-spacing: 0.03em;
    padding: 6px 11px; border-radius: 999px;
    border: 1px solid var(--line); background: transparent;
    color: var(--muted); transition: all 0.15s;
  }

  .r-btn.touch:hover { background: var(--teal-soft); border-color: var(--teal); color: var(--teal); }
  .r-btn.promote:hover { background: var(--slate-soft); border-color: var(--slate); color: var(--slate); }

  .r-checkin { width: 100%; display: flex; gap: 8px; align-items: center; }

  .r-checkin input {
    flex: 1; min-width: 0; font-size: 14px; padding: 8px 11px;
    border: 1px solid var(--line); border-radius: 9px;
    background: var(--bg); outline: none;
  }

  .r-checkin input:focus { border-color: var(--teal); }

  .r-checkin button {
    font-size: 13px; font-weight: 600; padding: 8px 14px;
    border: none; border-radius: 9px; background: var(--teal); color: #fff;
  }

  .r-log { width: 100%; font-size: 13px; color: var(--muted); }
  .r-log-entry { padding: 4px 0; border-top: 1px dashed var(--line); }
  .r-log-entry b { color: var(--charcoal); font-weight: 600; }

  .r-history {
    border: none; background: none; font-size: 12px; color: var(--muted);
    padding: 4px; text-decoration: underline; text-underline-offset: 2px;
  }

  /* =====================================================================
     MISC & FOOTER
     ===================================================================== */
  .empty { text-align: center; padding: 48px 0; color: var(--muted); font-size: 15px; }
  .loading { text-align: center; padding: 80px 0; color: var(--muted); font-size: 15px; }

  .data-bar {
    margin-top: 28px; padding-top: 14px; border-top: 1px solid var(--line);
    display: flex; align-items: center; gap: 14px;
    font-size: 12px; color: var(--muted); flex-wrap: wrap;
  }

  .data-bar button {
    font-size: 12px; border: none; background: none; color: var(--slate);
    padding: 4px 0; text-decoration: underline; text-underline-offset: 2px;
  }

  .data-bar button:hover { color: var(--charcoal); }

  .dbx-setup { border-top: none; margin-top: 6px; padding-top: 0; }

  .dbx-setup input {
    font-size: 13px; padding: 7px 10px;
    border: 1px solid var(--line); border-radius: 8px;
    background: var(--surface); color: var(--charcoal);
    outline: none; min-width: 180px;
  }

  .dbx-setup input:focus { border-color: var(--teal); }

  /* =====================================================================
     RESPONSIVE & TOUCH
     ===================================================================== */
  @media (max-width: 600px) {
    body { padding: 24px 14px; }
    h1 { font-size: 26px; }
    .matrix { grid-template-columns: 1fr; }
    .task:not(.compact) .flags { order: 3; width: 100%; padding-left: 34px; }
    .r-actions { width: 100%; justify-content: flex-end; }
  }

  @media (hover: none) {
    .task:not(.compact) { padding: 16px 14px; }
    .del { opacity: 1; padding: 10px 12px; margin: -10px -6px -10px 0; }
    .flags .flag { padding: 7px 12px; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="eyebrow">Today</div>
    <h1>Tasks</h1>
    <div class="count" id="count"></div>
  </header>

  <div class="scope" id="scope" role="tablist" aria-label="Work or private tasks">
    <button data-scope="work" class="active-work">Work</button>
    <button data-scope="private">Private</button>
    <button data-scope="both">Both</button>
  </div>

  <div class="composer">
    <div class="input-row">
      <input id="input" type="text" placeholder="Add a task…" aria-label="New task">
      <button id="addBtn">Add</button>
    </div>
    <div class="composer-flags" id="composerFlags"></div>
    <div class="composer-flags" id="composerFollowPop" hidden></div>
  </div>

  <div class="toolbar">
    <div class="pills" id="viewPills" role="tablist" aria-label="View"></div>
    <div class="pills" id="filterPills" role="tablist" aria-label="Filter tasks"></div>
  </div>

  <div id="viewHost"></div>
  <div class="empty" id="emptyMsg" hidden></div>

  <div class="data-bar">
    <span id="storageStatus"></span>
    <button id="dbxBtn">Connect Dropbox</button>
    <button id="dbxDisconnect" hidden>Disconnect Dropbox</button>
    <button id="exportBtn">Export backup</button>
    <button id="importBtn">Import backup</button>
    <input type="file" id="importFile" accept=".json,application/json" hidden>
  </div>
  <div class="data-bar dbx-setup" id="dbxSetup" hidden>
    <span>Paste your Dropbox App key (one-time, from the Dropbox App Console):</span>
    <input type="text" id="dbxKeyInput" placeholder="App key" aria-label="Dropbox app key">
    <button id="dbxKeySave">Save &amp; connect</button>
  </div>
</div>
<script>
'use strict';

/* =========================================================================
   1. UTILITIES
   ========================================================================= */

/** Tiny DOM builder: el('button', {class:'flag', onclick:fn, text:'Hi'}, child…) */
function el(tag, attrs = {}, ...kids) {
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (v == null || v === false) continue;
    if (k === 'class') n.className = v;
    else if (k === 'text') n.textContent = v;
    else if (k === 'html') n.innerHTML = v;
    else if (k === 'dataset') Object.assign(n.dataset, v);
    else if (k.startsWith('on')) n.addEventListener(k.slice(2), v);
    else n.setAttribute(k, v === true ? '' : v);
  }
  for (const kid of kids.flat(2)) if (kid != null) n.append(kid);
  return n;
}

const $ = id => document.getElementById(id);

const CHECK_SVG = '<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2 6.5L4.8 9L10 3.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
const GRIP_SVG = '<svg width="10" height="16" viewBox="0 0 10 16" fill="currentColor"><circle cx="2.5" cy="3" r="1.5"/><circle cx="7.5" cy="3" r="1.5"/><circle cx="2.5" cy="8" r="1.5"/><circle cx="7.5" cy="8" r="1.5"/><circle cx="2.5" cy="13" r="1.5"/><circle cx="7.5" cy="13" r="1.5"/></svg>';

/* =========================================================================
   2. DATES & THE WORK/PRIVATE CALENDAR
   All follow-up arithmetic lives here. "work" counts Mon–Fri; "private"
   counts calendar days. Weeks start Monday (DK convention).
   ========================================================================= */
const Cal = {
  toIso(d) {
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  },
  fromIso(iso) {
    const [y, m, d] = iso.split('-').map(Number);
    return new Date(y, m - 1, d);
  },
  today() { return Cal.toIso(new Date()); },
  fmt(iso) { return Cal.fromIso(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }); },
  addDays(n) { const d = new Date(); d.setDate(d.getDate() + n); return Cal.toIso(d); },
  isWeekend(iso) { return [0, 6].includes(Cal.fromIso(iso).getDay()); },
  rollToMonday(iso) {
    const d = Cal.fromIso(iso);
    while (d.getDay() === 0 || d.getDay() === 6) d.setDate(d.getDate() + 1);
    return Cal.toIso(d);
  },
  /** Signed calendar-day distance from today. */
  dayDiff(iso) {
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    return Math.round((Cal.fromIso(iso) - today) / 86400000);
  },
  /** Signed working-day (Mon–Fri) distance from today. */
  workDayDiff(iso) {
    const today = Cal.fromIso(Cal.today());
    const target = Cal.fromIso(iso);
    if (+today === +target) return 0;
    const sign = target > today ? 1 : -1;
    let count = 0;
    const cur = new Date(today);
    while (+cur !== +target) {
      cur.setDate(cur.getDate() + sign);
      const dow = cur.getDay();
      if (dow !== 0 && dow !== 6) count += sign;
    }
    return count;
  },
  _weekday(offsetFromMonday, plusWeeks = 0) {
    const d = new Date();
    const dow = (d.getDay() + 6) % 7;                // Mon=0 … Sun=6
    d.setDate(d.getDate() + (offsetFromMonday - dow) + plusWeeks * 7);
    return Cal.toIso(d);
  },
  thisFriday()  { return Cal._weekday(4); },
  nextFriday()  { return Cal._weekday(4, 1); },
  thisSunday()  { return Cal._weekday(6); },
  nextSunday()  { return Cal._weekday(6, 1); },
  /** The date that closes "this week" for a given context. */
  weekEndFor(ctx) { return ctx === 'work' ? Cal.thisFriday() : Cal.thisSunday(); },

  /**
   * Quick-pick options for the follow-up editor, computed per context.
   * Options landing on the same date merge labels (e.g. Thursday:
   * "Tomorrow · End of week") so none can silently disappear.
   */
  quickOptions(ctx) {
    let opts;
    if (ctx === 'work') {
      const t1 = Cal.rollToMonday(Cal.addDays(1));
      opts = [
        { label: Cal.dayDiff(t1) === 1 ? 'Tomorrow' : 'Monday', date: t1 },
        { label: 'End of week', date: Cal.thisFriday() },
        { label: 'One week from now', date: Cal.rollToMonday(Cal.addDays(7)) },
        { label: 'End of following week', date: Cal.nextFriday() }
      ];
    } else {
      opts = [
        { label: 'Tomorrow', date: Cal.addDays(1) },
        { label: 'End of week', date: Cal.thisSunday() },
        { label: 'One week from now', date: Cal.addDays(7) },
        { label: 'End of following week', date: Cal.nextSunday() }
      ];
    }
    const today = Cal.today();
    const byDate = new Map();
    for (const o of opts) {
      if (o.date <= today) continue;
      if (byDate.has(o.date)) byDate.get(o.date).label += ' \u00b7 ' + o.label;
      else byDate.set(o.date, { ...o });
    }
    return [...byDate.values()];
  },

  /** "1 wd" / "3 d" — the remaining-time suffix on quick-pick buttons. */
  remainingLabel(iso, ctx) {
    if (ctx === 'work') {
      const wd = Cal.workDayDiff(iso);
      return wd + ' wd';
    }
    return Cal.dayDiff(iso) + ' d';
  }
};

/* =========================================================================
   3. DOMAIN MODEL
   Follow-ups: { date:'YYYY-MM-DD', time:'HH:MM'|null }. A date-only
   follow-up is due at end of that day; a timed one at that minute.
   ========================================================================= */
const QUADRANTS = [
  { key: 'do',        title: 'Do now',    sub: 'Urgent + important',           urgent: true,  important: true  },
  { key: 'schedule',  title: 'Schedule',  sub: 'Important, not urgent',        urgent: false, important: true  },
  { key: 'delegate',  title: 'Delegate',  sub: 'Urgent, not important',        urgent: true,  important: false },
  { key: 'eliminate', title: 'Eliminate', sub: 'Neither urgent nor important', urgent: false, important: false }
];

const STAGES = [
  { key: 'watching',  title: 'Watching',     sub: 'On the radar, nothing to do yet' },
  { key: 'simmering', title: 'Simmering',    sub: 'Developing \u2014 may need action before long' },
  { key: 'winding',   title: 'Winding down', sub: 'Letting go \u2014 confirm and close out' }
];

const Follow = {
  dueMoment(f) {
    const d = Cal.fromIso(f.date);
    if (f.time) { const [hh, mm] = f.time.split(':').map(Number); d.setHours(hh, mm, 0, 0); }
    else d.setHours(23, 59, 59, 0);
    return d;
  },
  status(t) {
    if (!t.followUp || t.done) return null;
    if (Follow.dueMoment(t.followUp) < new Date()) return 'overdue';
    if (t.followUp.date === Cal.today()) return 'today';
    return 'upcoming';
  },
  countdown(f, ctx) {
    if (f.time) {
      const diffMin = Math.round((Follow.dueMoment(f) - new Date()) / 60000);
      const abs = Math.abs(diffMin);
      let span;
      if (abs < 60) span = abs + ' min';
      else if (abs < 1440) span = (Math.floor(abs / 60) + ' h ' + (abs % 60 > 0 ? (abs % 60) + ' min' : '')).trim();
      else span = Math.floor(abs / 1440) + ' d';
      return diffMin >= 0 ? 'in ' + span : span + ' over';
    }
    const dd = Cal.dayDiff(f.date);
    if (dd === 0) return 'today';
    if (dd === 1) return 'tomorrow';
    if (ctx === 'work') {
      const wd = Cal.workDayDiff(f.date);
      return dd > 0 ? 'in ' + wd + ' wd' : (-wd) + ' wd over';
    }
    return dd > 0 ? 'in ' + dd + ' d' : (-dd) + ' d over';
  },
  chipLabel(f, ctx) {
    const when = f.time
      ? (f.date === Cal.today() ? f.time : Cal.fmt(f.date) + ' ' + f.time)
      : Cal.fmt(f.date);
    return when + ' \u00b7 ' + Follow.countdown(f, ctx);
  }
};

const Radar = {
  lastTouch: r => r.log.length ? r.log[r.log.length - 1].date : r.created,
  age: r => -Cal.dayDiff(Radar.lastTouch(r)),
  ageLabel(r) {
    const a = Radar.age(r);
    return a === 0 ? 'touched today' : a === 1 ? 'touched yesterday' : 'touched ' + a + ' d ago';
  },
  freshness(r) {
    const a = Radar.age(r);
    return a < 7 ? 'fresh' : a < 21 ? 'aging' : 'stale';
  }
};

/** Character cap for task notes — change this one number to adjust. */
const NOTE_MAX = 280;

const Subs = {
  stats(t) {
    const subs = t.subs || [];
    return { total: subs.length, done: subs.filter(s => s.done).length };
  }
};

/* =========================================================================
   4. STATE
   S.data is what persists (identical shape to every earlier version).
   S.ui is transient per-session state.
   ========================================================================= */
const S = {
  data: { tasks: [], radar: [], nextId: 1 },
  ui: {
    scope: 'work',            // work | private | both
    view: 'list',             // list | matrix | followups | radar
    filter: 'all',            // all | active | done
    openDateEditor: null,     // task id with the follow-up editor open
    openEdit: null,           // id (task/sub/radar) being renamed
    openCheckin: null,        // radar id with check-in form open
    openHistory: null,        // radar id with history expanded
    openSubs: new Set(),      // task ids with subtask panel expanded
    openNotes: new Set(),     // task ids with note panel expanded
    pendingSubFocus: null,    // refocus add-subtask input after render
    composer: { context: 'work', urgent: false, important: false, follow: null, stage: 'watching' }
  }
};

/** Accept any historical data shape and normalise it. */
function migrate(data) {
  if (Array.isArray(data.tasks)) S.data.tasks = data.tasks;
  if (Array.isArray(data.radar)) S.data.radar = data.radar;
  if (typeof data.nextId === 'number') S.data.nextId = data.nextId;
  for (const t of S.data.tasks) {
    if (!Array.isArray(t.subs)) t.subs = [];
    if (!t.context) t.context = 'work';
    if (typeof t.note !== 'string') t.note = '';
  }
  for (const r of S.data.radar) {
    if (!Array.isArray(r.log)) r.log = [];
    if (!r.stage) r.stage = 'watching';
    if (!r.context) r.context = 'work';
  }
}

const uid = () => S.data.nextId++;
const inScope = x => S.ui.scope === 'both' || x.context === S.ui.scope;

function visibleTasks() {
  const f = S.ui.filter;
  return S.data.tasks.filter(t => inScope(t) && (f === 'all' || (f === 'done') === t.done));
}

/* =========================================================================
   5. PERSISTENCE — local cache (always) + Dropbox sync (optional)
   Keys are unchanged from previous versions, so existing data loads as-is.
   ========================================================================= */
const Store = {
  LOCAL_KEY: 'eisenhower-todo-v1',
  DBX_FILE: '/tasks-data.json',
  localOk: false,
  state: 'off',              // off | connected | syncing | error
  lastSyncAt: null,
  _timer: null,

  serialize() { return JSON.stringify(S.data, null, 2); },

  get appKey()        { return localStorage.getItem('dbx-app-key') || ''; },
  set appKey(v)       { localStorage.setItem('dbx-app-key', v); },
  get refreshToken()  { return localStorage.getItem('dbx-refresh') || ''; },
  set refreshToken(v) { v ? localStorage.setItem('dbx-refresh', v) : localStorage.removeItem('dbx-refresh'); },
  accessToken: '',
  accessExpiry: 0,

  loadLocal() {
    try {
      const raw = localStorage.getItem(Store.LOCAL_KEY);
      if (raw) migrate(JSON.parse(raw));
    } catch (e) { /* start fresh */ }
  },

  /** Called after every state change: local write + debounced Dropbox upload. */
  save() {
    try {
      localStorage.setItem(Store.LOCAL_KEY, Store.serialize());
      Store.localOk = true;
    } catch (e) { Store.localOk = false; }
    if (Store.refreshToken) {
      clearTimeout(Store._timer);
      Store._timer = setTimeout(() => Store.syncUp(), 1200);
    }
    renderStatus();
  },

  flush() {
    if (Store._timer) { clearTimeout(Store._timer); Store.syncUp(); }
  },

  /* ---- OAuth 2 with PKCE (no secret ever ships in this page) ---- */
  _b64url(bytes) {
    return btoa(String.fromCharCode(...new Uint8Array(bytes)))
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  },

  async startAuth() {
    const verifier = Store._b64url(crypto.getRandomValues(new Uint8Array(48)));
    sessionStorage.setItem('dbx-verifier', verifier);
    const challenge = Store._b64url(await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier)));
    const redirect = location.origin + location.pathname;
    location.href = 'https://www.dropbox.com/oauth2/authorize'
      + '?client_id=' + encodeURIComponent(Store.appKey)
      + '&response_type=code&code_challenge=' + challenge
      + '&code_challenge_method=S256&token_access_type=offline'
      + '&redirect_uri=' + encodeURIComponent(redirect);
  },

  async _token(params) {
    const res = await fetch('https://api.dropboxapi.com/oauth2/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams(params)
    });
    if (!res.ok) throw new Error('token request failed: ' + res.status);
    return res.json();
  },

  /** Handle the ?code=… redirect back from the Dropbox consent screen. */
  async finishAuth() {
    const code = new URLSearchParams(location.search).get('code');
    if (!code) return false;
    const verifier = sessionStorage.getItem('dbx-verifier');
    history.replaceState(null, '', location.pathname);
    if (!verifier) return false;
    try {
      const d = await Store._token({
        code, grant_type: 'authorization_code', code_verifier: verifier,
        client_id: Store.appKey, redirect_uri: location.origin + location.pathname
      });
      Store.refreshToken = d.refresh_token;
      Store.accessToken = d.access_token;
      Store.accessExpiry = Date.now() + (d.expires_in - 60) * 1000;
      Store.state = 'connected';
      return true;
    } catch (e) { Store.state = 'error'; return false; }
  },

  async _access() {
    if (Store.accessToken && Date.now() < Store.accessExpiry) return Store.accessToken;
    const d = await Store._token({
      grant_type: 'refresh_token', refresh_token: Store.refreshToken, client_id: Store.appKey
    });
    Store.accessToken = d.access_token;
    Store.accessExpiry = Date.now() + (d.expires_in - 60) * 1000;
    return Store.accessToken;
  },

  async _download() {
    const token = await Store._access();
    const res = await fetch('https://content.dropboxapi.com/2/files/download', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Dropbox-API-Arg': JSON.stringify({ path: Store.DBX_FILE }) }
    });
    if (res.status === 409) return null;                 // no file yet: first run
    if (!res.ok) throw new Error('download failed: ' + res.status);
    return res.text();
  },

  async _upload() {
    const token = await Store._access();
    const res = await fetch('https://content.dropboxapi.com/2/files/upload', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + token,
        'Dropbox-API-Arg': JSON.stringify({ path: Store.DBX_FILE, mode: 'overwrite', mute: true }),
        'Content-Type': 'application/octet-stream'
      },
      body: Store.serialize()
    });
    if (!res.ok) throw new Error('upload failed: ' + res.status);
  },

  /** On boot: the Dropbox copy wins over the local cache. */
  async syncDown() {
    if (!Store.refreshToken) return;
    try {
      Store.state = 'syncing'; renderStatus();
      const text = await Store._download();
      if (text && text.trim()) migrate(JSON.parse(text));
      else await Store._upload();                        // seed remote with local data
      Store.lastSyncAt = new Date();
      Store.state = 'connected';
    } catch (e) { Store.state = 'error'; }
    renderStatus();
  },

  async syncUp() {
    if (!Store.refreshToken) return;
    try {
      Store.state = 'syncing'; renderStatus();
      await Store._upload();
      Store.lastSyncAt = new Date();
      Store.state = 'connected';
    } catch (e) { Store.state = 'error'; }
    renderStatus();
  },

  disconnect() {
    Store.refreshToken = '';
    Store.accessToken = '';
    Store.state = 'off';
    renderStatus();
  }
};

/* =========================================================================
   6. DRAG CONTROLLER
   Pointer-events based so it works with mouse and touch alike. Tasks drop
   on .quadrant zones, radar items on .stage-zone zones.
   ========================================================================= */
const Drag = {
  active: null,

  start(e, item, kind, gripEl) {
    e.preventDefault();
    gripEl.setPointerCapture(e.pointerId);
    const ghost = el('div', { class: 'drag-ghost', text: item.text });
    document.body.appendChild(ghost);
    const sourceRow = gripEl.closest('.task, .r-card');
    if (sourceRow) sourceRow.classList.add('dragging-source');
    Drag.active = { item, kind, ghost, sourceRow };
    Drag._move(e.clientX, e.clientY);
    gripEl.addEventListener('pointermove', Drag._onMove);
    gripEl.addEventListener('pointerup', Drag._onEnd);
    gripEl.addEventListener('pointercancel', Drag._onEnd);
  },

  _move(x, y) {
    Drag.active.ghost.style.left = (x + 12) + 'px';
    Drag.active.ghost.style.top = (y - 14) + 'px';
  },

  _zoneAt(x, y) {
    Drag.active.ghost.style.display = 'none';
    const hit = document.elementFromPoint(x, y);
    Drag.active.ghost.style.display = '';
    if (!hit) return null;
    return Drag.active.kind === 'radar' ? hit.closest('.stage-zone') : hit.closest('.quadrant');
  },

  _onMove(e) {
    if (!Drag.active) return;
    Drag._move(e.clientX, e.clientY);
    const z = Drag._zoneAt(e.clientX, e.clientY);
    document.querySelectorAll('.quadrant, .stage-zone').forEach(n =>
      n.classList.toggle('drop-target', n === z));
  },

  _onEnd(e) {
    if (!Drag.active) return;
    const { item, kind, ghost, sourceRow } = Drag.active;
    const z = Drag._zoneAt(e.clientX, e.clientY);
    if (z) {
      if (kind === 'radar') {
        if (z.dataset.stage) item.stage = z.dataset.stage;
      } else {
        const q = QUADRANTS.find(x => z.classList.contains('q-' + x.key));
        if (q) {
          item.urgent = q.urgent;
          item.important = q.important;
          item.sorted = true;
          // Delegation without a check-back date is how things die quietly:
          if (q.key === 'delegate' && !item.followUp) S.ui.openDateEditor = item.id;
        }
      }
    }
    ghost.remove();
    if (sourceRow) sourceRow.classList.remove('dragging-source');
    document.querySelectorAll('.drop-target').forEach(n => n.classList.remove('drop-target'));
    Drag.active = null;
    render();
  }
};

/* =========================================================================
   7. COMPONENTS — small factories that return DOM nodes
   ========================================================================= */

function Check(item, { small = false, label = 'task' } = {}) {
  return el('button', {
    class: 'check',
    'aria-label': (item.done ? 'Mark ' : 'Complete ') + label,
    html: CHECK_SVG,
    onclick: () => { item.done = !item.done; render(); }
  });
}

/** Text that turns into an inline editor when tapped. */
function EditableText(item) {
  if (S.ui.openEdit === item.id) {
    const inp = el('input', { class: 'edit-input', type: 'text', value: item.text, 'aria-label': 'Edit text' });
    const commit = () => {
      if (S.ui.openEdit !== item.id) return;             // already cancelled
      const v = inp.value.trim();
      if (v) item.text = v;
      S.ui.openEdit = null;
      render();
    };
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') commit();
      if (e.key === 'Escape') { S.ui.openEdit = null; render(); }
    });
    inp.addEventListener('blur', commit);
    setTimeout(() => { inp.focus(); inp.select(); }, 0);
    return inp;
  }
  return el('span', {
    class: 'text', text: item.text, title: 'Tap to edit',
    onclick: () => { S.ui.openEdit = item.id; render(); }
  });
}

function CtxTag(item) {
  const w = item.context === 'work';
  return el('span', { class: 'ctx-tag ' + (w ? 'w' : 'p'), text: w ? 'Work' : 'Private' });
}

function Grip(item, kind) {
  return el('button', {
    class: 'grip', html: GRIP_SVG,
    'aria-label': kind === 'radar' ? 'Drag to a stage' : 'Drag to a quadrant',
    onpointerdown: e => Drag.start(e, item, kind, e.currentTarget)
  });
}

function UrgentImportantChips(t) {
  const mk = (key, label, cls) => el('button', {
    class: 'flag ' + cls + (t[key] ? ' on' : ''), text: label, 'aria-pressed': String(t[key]),
    onclick: () => { t[key] = !t[key]; t.sorted = true; render(); }
  });
  return [mk('urgent', 'Urgent', 'u'), mk('important', 'Important', 'i')];
}

function FollowChip(t) {
  const status = Follow.status(t);
  return el('button', {
    class: 'flag f' + (t.followUp ? ' on' : '') + (status ? ' ' + status : ''),
    text: t.followUp ? (status === 'overdue' ? '\u26a0 ' : '') + Follow.chipLabel(t.followUp, t.context) : '+ Follow up',
    onclick: () => {
      S.ui.openDateEditor = S.ui.openDateEditor === t.id ? null : t.id;
      render();
    }
  });
}

/** Two-mode follow-up editor: "Later today" (time) / "Pick a date" (quick picks + custom). */
function FollowEditor(current, ctx, onDone) {
  const bToday = el('button', { text: 'Later today' });
  const bDate = el('button', { text: 'Pick a date' });

  const timeInput = el('input', { type: 'time', 'aria-label': 'Follow-up time today',
    value: current && current.time ? current.time : '' });
  timeInput.addEventListener('change', () => {
    if (timeInput.value) onDone({ date: Cal.today(), time: timeInput.value });
  });

  const quick = el('div', { class: 'quick-dates' },
    Cal.quickOptions(ctx).map(o => el('button', {
      onclick: () => onDone({ date: o.date, time: null })
    }, o.label, el('small', { text: Cal.fmt(o.date) + ' \u00b7 ' + Cal.remainingLabel(o.date, ctx) }))));

  const dateInput = el('input', { type: 'date', 'aria-label': 'Custom follow-up date',
    value: current && !current.time ? current.date : '' });
  dateInput.addEventListener('change', () => {
    if (!dateInput.value) return;
    let date = dateInput.value;
    if (ctx === 'work' && Cal.isWeekend(date)) date = Cal.rollToMonday(date);  // work has no weekends
    onDone({ date, time: null });
  });

  function setMode(m, openPicker) {
    bToday.classList.toggle('active', m === 'today');
    bDate.classList.toggle('active', m === 'date');
    timeInput.style.display = m === 'today' ? '' : 'none';
    quick.style.display = m === 'date' ? '' : 'none';
    dateInput.style.display = m === 'date' ? '' : 'none';
    if (openPicker && m === 'today') setTimeout(() => {
      timeInput.focus();
      if (timeInput.showPicker) { try { timeInput.showPicker(); } catch (e) {} }
    }, 0);
  }

  bToday.addEventListener('click', () => setMode('today', true));
  bDate.addEventListener('click', () => setMode('date', true));
  setMode(current && !current.time ? 'date' : 'today', false);

  return el('div', { class: 'date-pop' },
    el('div', { class: 'mode-toggle' }, bToday, bDate),
    timeInput, quick, dateInput,
    el('button', { class: 'clear-date', text: 'Clear', onclick: () => onDone(null) }));
}

function TaskFollowEditor(t) {
  return FollowEditor(t.followUp, t.context, f => {
    t.followUp = f;
    S.ui.openDateEditor = null;
    render();
  });
}

/* ---- Subtasks ---- */

function SubChip(t) {
  const { total, done } = Subs.stats(t);
  return el('button', {
    class: 'flag sc' + (total > 0 ? (done === total ? ' complete' : ' on') : ''),
    text: total > 0 ? done + '/' + total : '+ Sub',
    'aria-label': total > 0 ? done + ' of ' + total + ' subtasks done' : 'Add subtasks',
    onclick: () => {
      const set = S.ui.openSubs;
      set.has(t.id) ? set.delete(t.id) : set.add(t.id);
      render();
    }
  });
}

function SubPanel(t) {
  const rows = t.subs.map(s => el('div', { class: 'sub-row' + (s.done ? ' done' : '') },
    Check(s, { small: true, label: 'subtask' }),
    EditableText(s),
    el('button', { class: 'del', text: '\u00d7', 'aria-label': 'Delete subtask',
      onclick: () => { t.subs = t.subs.filter(x => x.id !== s.id); render(); } })));

  const inp = el('input', { type: 'text', placeholder: 'Add a subtask\u2026', 'aria-label': 'New subtask' });
  const add = () => {
    const v = inp.value.trim();
    if (!v) return;
    t.subs.push({ id: 's' + uid(), text: v, done: false });
    S.ui.pendingSubFocus = t.id;   // keep the keyboard flowing on mobile
    render();
  };
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') add(); });

  if (S.ui.pendingSubFocus === t.id) {
    S.ui.pendingSubFocus = null;
    setTimeout(() => inp.focus(), 0);
  }

  return el('div', { class: 'sub-panel' }, rows,
    el('div', { class: 'sub-add' }, inp, el('button', { text: 'Add', onclick: add })));
}

/* ---- Notes ---- */

function NoteChip(t) {
  const has = t.note.length > 0;
  return el('button', {
    class: 'flag nt' + (has ? ' on' : ''),
    text: has ? 'Note' : '+ Note',
    'aria-label': has ? 'View note' : 'Add a note',
    onclick: () => {
      const set = S.ui.openNotes;
      set.has(t.id) ? set.delete(t.id) : set.add(t.id);
      render();
    }
  });
}

function NotePanel(t) {
  // The textarea writes straight into state on input (no re-render, so the
  // keyboard never loses focus); the debounced Store.save picks it up.
  const counter = el('span', { class: 'note-count', text: t.note.length + '/' + NOTE_MAX });
  const ta = el('textarea', {
    class: 'note-box', maxlength: String(NOTE_MAX), rows: '3',
    placeholder: 'A short note \u2014 context, links, who said what\u2026',
    'aria-label': 'Task note'
  });
  ta.value = t.note;
  ta.addEventListener('input', () => {
    t.note = ta.value.slice(0, NOTE_MAX);
    counter.textContent = t.note.length + '/' + NOTE_MAX;
    counter.classList.toggle('full', t.note.length >= NOTE_MAX);
    Store.save();
  });
  return el('div', { class: 'note-panel' }, ta, counter);
}

/* ---- The one task row, used by every task-bearing view ----
   opts: { grip:boolean, compact:boolean, chips:boolean, deletable:boolean } */
function TaskRow(t, opts = {}) {
  const { grip = false, compact = false, chips = true, deletable = true } = opts;
  const row = el('div', {
    class: 'task ctx-' + t.context + (t.done ? ' done' : '') + (compact ? ' compact' : '')
  });

  if (grip) row.append(Grip(t, 'task'));
  row.append(Check(t), EditableText(t));
  if (S.ui.scope === 'both') row.append(CtxTag(t));

  if (chips) {
    row.append(el('div', { class: 'flags' }, UrgentImportantChips(t), SubChip(t), NoteChip(t), FollowChip(t)));
  } else {
    row.append(el('div', { class: 'flags' }, SubChip(t), NoteChip(t), FollowChip(t)));
  }

  if (deletable) row.append(el('button', { class: 'del', text: '\u00d7', 'aria-label': 'Delete task',
    onclick: () => { S.data.tasks = S.data.tasks.filter(x => x.id !== t.id); render(); } }));

  if (S.ui.openDateEditor === t.id) row.append(TaskFollowEditor(t));
  if (S.ui.openNotes.has(t.id)) row.append(NotePanel(t));
  if (S.ui.openSubs.has(t.id)) row.append(SubPanel(t));
  return row;
}

/* =========================================================================
   8. VIEWS — each returns a DOM node for the view host.
   Adding a view = add an entry to Views and a pill in VIEW_PILLS.
   ========================================================================= */
const Views = {

  list() {
    return el('div', { class: 'tasks' }, visibleTasks().map(t => TaskRow(t)));
  },

  matrix() {
    const vis = visibleTasks();

    const grid = el('div', { class: 'matrix' }, QUADRANTS.map(q => {
      const items = vis.filter(t => t.sorted && t.urgent === q.urgent && t.important === q.important);
      return el('div', { class: 'quadrant q-' + q.key },
        el('div', { class: 'q-title', text: q.title }),
        el('div', { class: 'q-sub', text: q.sub }),
        items.length === 0
          ? el('div', { class: 'zone-empty', text: 'Nothing here' })
          : items.map(t => TaskRow(t, { grip: true, compact: true, chips: false })));
    }));

    const unsorted = vis.filter(t => !t.sorted);
    const unsortedBlock = unsorted.length === 0 ? null :
      el('div', { class: 'unsorted' },
        el('h2', { text: 'Unsorted \u2014 drag into a quadrant' }),
        el('div', { class: 'tasks' }, unsorted.map(t => TaskRow(t, { grip: true, chips: false }))));

    return el('div', {}, grid, unsortedBlock);
  },

  followups() {
    const vis = visibleTasks();
    const today = Cal.today();
    const now = new Date();
    const tomorrow = Cal.addDays(1);

    const withDue = vis.filter(t => !t.done && t.followUp);
    const byDue = arr => arr.sort((a, b) => Follow.dueMoment(a.followUp) - Follow.dueMoment(b.followUp));
    // "End of week" honours each task's own calendar: Friday for work, Sunday for private
    const inWeek = t => t.followUp.date > tomorrow && t.followUp.date <= Cal.weekEndFor(t.context);

    const groups = [
      { title: 'Overdue', cls: 'overdue', items: byDue(withDue.filter(t => Follow.dueMoment(t.followUp) < now)) },
      { title: 'Today', cls: 'today', items: byDue(withDue.filter(t => Follow.dueMoment(t.followUp) >= now && t.followUp.date === today)) },
      { title: 'Tomorrow', cls: '', items: byDue(withDue.filter(t => t.followUp.date === tomorrow)) },
      { title: 'End of week', cls: '', items: byDue(withDue.filter(inWeek)) },
      { title: 'Future', cls: '', items: byDue(withDue.filter(t => t.followUp.date > tomorrow && !inWeek(t))) },
      { title: 'Delegated without follow-up', cls: 'nudge',
        items: vis.filter(t => !t.done && t.sorted && t.urgent && !t.important && !t.followUp),
        note: 'You delegated these but set no date to check back. Out of sight, out of mind.' }
    ].filter(g => g.items.length > 0);

    if (groups.length === 0) {
      return el('div', { class: 'empty', text: 'No follow-ups. Add one with the follow-up chip on any task.' });
    }

    return el('div', {}, groups.map(g =>
      el('div', { class: 'fu-group ' + g.cls },
        el('h2', { text: g.title }),
        g.note ? el('div', { class: 'fu-note', text: g.note }) : null,
        el('div', { class: 'tasks' }, g.items.map(t => TaskRow(t))))));
  },

  radar() {
    const vis = S.data.radar.filter(inScope);
    const stale = vis.filter(r => Radar.freshness(r) === 'stale').length;

    const summary = vis.length === 0 ? null :
      el('div', { class: 'radar-summary',
        text: vis.length + ' on the radar' +
          (stale > 0 ? ' \u00b7 ' + stale + ' untouched for 3+ weeks' : ' \u00b7 all recently touched') });

    return el('div', {}, summary, STAGES.map(stage => {
      const items = vis.filter(r => r.stage === stage.key)
        .sort((a, b) => Radar.age(b) - Radar.age(a));   // most neglected first
      return el('div', { class: 'stage-zone', dataset: { stage: stage.key } },
        el('h2', { text: stage.title }),
        el('div', { class: 'stage-sub', text: stage.sub }),
        items.length === 0
          ? el('div', { class: 'zone-empty', text: 'Nothing here \u2014 drag a card or add one above' })
          : items.map(RadarCard));
    }));
  }
};

function RadarCard(r) {
  const card = el('div', { class: 'r-card ctx-' + r.context + ' ' + Radar.freshness(r) },
    Grip(r, 'radar'),
    EditableText(r),
    S.ui.scope === 'both' ? CtxTag(r) : null,
    el('span', { class: 'r-age', text: Radar.ageLabel(r) }),
    el('div', { class: 'r-actions' },
      el('button', { class: 'r-btn touch', text: 'Check in', onclick: () => {
        S.ui.openCheckin = S.ui.openCheckin === r.id ? null : r.id;
        S.ui.openHistory = null;
        render();
      } }),
      el('button', { class: 'r-btn promote', text: '\u2192 Task', 'aria-label': 'Promote to task', onclick: () => {
        S.data.tasks.push({
          id: uid(), text: r.text, done: false, context: r.context,
          urgent: false, important: false, sorted: false, followUp: null, subs: [], note: ''
        });
        S.data.radar = S.data.radar.filter(x => x.id !== r.id);
        render();
      } }),
      el('button', { class: 'del', text: '\u00d7', 'aria-label': 'Remove from radar', onclick: () => {
        S.data.radar = S.data.radar.filter(x => x.id !== r.id);
        render();
      } })));

  if (S.ui.openCheckin === r.id) {
    const note = el('input', { type: 'text',
      placeholder: 'Optional note \u2014 what did you see or decide?', 'aria-label': 'Check-in note' });
    const log = () => {
      r.log.push({ date: Cal.today(), note: note.value.trim() });
      S.ui.openCheckin = null;
      render();
    };
    note.addEventListener('keydown', e => { if (e.key === 'Enter') log(); });
    card.append(el('div', { class: 'r-checkin' }, note, el('button', { text: 'Log check-in', onclick: log })));
    setTimeout(() => note.focus(), 0);
  }

  if (r.log.length > 0) {
    card.append(el('button', { class: 'r-history',
      text: S.ui.openHistory === r.id ? 'Hide history' : r.log.length + (r.log.length === 1 ? ' check-in' : ' check-ins'),
      onclick: () => {
        S.ui.openHistory = S.ui.openHistory === r.id ? null : r.id;
        S.ui.openCheckin = null;
        render();
      } }));
  }

  if (S.ui.openHistory === r.id) {
    card.append(el('div', { class: 'r-log' }, [...r.log].reverse().map(entry =>
      el('div', { class: 'r-log-entry' },
        el('b', { text: Cal.fmt(entry.date) }),
        ' \u2014 ' + (entry.note || 'checked in')))));
  }

  return card;
}

/* =========================================================================
   9. COMPOSER — the add bar adapts to the active view:
   task chips normally, stage chips in the Radar view.
   ========================================================================= */
const Composer = {

  add() {
    const input = $('input');
    const text = input.value.trim();
    if (!text) return;
    const c = S.ui.composer;

    if (S.ui.view === 'radar') {
      S.data.radar.push({
        id: 'r' + uid(), text, context: c.context, stage: c.stage,
        created: Cal.today(), log: []
      });
    } else {
      S.data.tasks.push({
        id: uid(), text, done: false, context: c.context,
        urgent: c.urgent, important: c.important,
        sorted: c.urgent || c.important,
        followUp: c.follow, subs: [], note: ''
      });
      c.urgent = false; c.important = false; c.follow = null;
      $('composerFollowPop').hidden = true;
    }
    input.value = '';
    Composer.render();
    input.focus();
    render();
  },

  setContext(ctx) {
    const c = S.ui.composer;
    if (c.context !== ctx) {
      c.context = ctx;
      // A date picked under private rules may be a weekend — illegal for work
      if (c.follow && !c.follow.time && ctx === 'work' && Cal.isWeekend(c.follow.date)) {
        c.follow = { date: Cal.rollToMonday(c.follow.date), time: null };
      }
      $('composerFollowPop').hidden = true;
    }
    Composer.render();
  },

  toggleFollowEditor() {
    const pop = $('composerFollowPop');
    if (pop.hidden) {
      pop.hidden = false;
      pop.innerHTML = '';
      pop.append(FollowEditor(S.ui.composer.follow, S.ui.composer.context, f => {
        S.ui.composer.follow = f;
        pop.hidden = true;
        Composer.render();
      }));
    } else {
      pop.hidden = true;
    }
  },

  render() {
    const c = S.ui.composer;
    const radarMode = S.ui.view === 'radar';
    const host = $('composerFlags');
    host.innerHTML = '';

    host.append(
      el('button', { class: 'flag cw' + (c.context === 'work' ? ' on' : ''), text: 'Work',
        'aria-pressed': String(c.context === 'work'), onclick: () => Composer.setContext('work') }),
      el('button', { class: 'flag cp' + (c.context === 'private' ? ' on' : ''), text: 'Private',
        'aria-pressed': String(c.context === 'private'), onclick: () => Composer.setContext('private') }),
      el('span', { class: 'sep' }));

    if (radarMode) {
      $('composerFollowPop').hidden = true;
      host.append(...STAGES.map(s =>
        el('button', { class: 'flag st' + (c.stage === s.key ? ' on' : ''), text: s.title,
          'aria-pressed': String(c.stage === s.key),
          onclick: () => { c.stage = s.key; Composer.render(); } })));
    } else {
      const mk = (key, label, cls) => el('button', {
        class: 'flag ' + cls + (c[key] ? ' on' : ''), text: label, 'aria-pressed': String(c[key]),
        onclick: () => { c[key] = !c[key]; Composer.render(); }
      });
      host.append(
        mk('urgent', 'Urgent', 'u'),
        mk('important', 'Important', 'i'),
        el('button', { class: 'flag f' + (c.follow ? ' on' : ''),
          text: c.follow ? 'Follow up ' + Follow.chipLabel(c.follow, c.context) : 'Follow up',
          'aria-pressed': String(!!c.follow), onclick: Composer.toggleFollowEditor }));

      const target = c.urgent && c.important ? 'Do now' : c.important ? 'Schedule' : c.urgent ? 'Delegate' : '';
      if (target) host.append(el('span', { class: 'composer-target', text: '\u2192 ' + target }));
    }

    $('input').placeholder = radarMode ? 'Add to radar\u2026' : 'Add a task\u2026';
  }
};

/* =========================================================================
   10. SHELL — scope, pills, header, status line, master render
   ========================================================================= */
const VIEW_PILLS = [
  { key: 'list', label: 'List' },
  { key: 'matrix', label: 'Matrix' },
  { key: 'followups', label: 'Follow-ups' },
  { key: 'radar', label: 'Radar' }
];

const FILTER_PILLS = [
  { key: 'all', label: 'All' },
  { key: 'active', label: 'Active' },
  { key: 'done', label: 'Done' }
];

function renderShell() {
  // scope segmented control
  document.querySelectorAll('#scope button').forEach(b => {
    b.className = b.dataset.scope === S.ui.scope ? 'active-' + S.ui.scope : '';
  });

  // view pills (Follow-ups gets a red dot when anything is overdue)
  const overdue = S.data.tasks.filter(inScope).filter(t => Follow.status(t) === 'overdue').length;
  const vp = $('viewPills');
  vp.innerHTML = '';
  vp.append(...VIEW_PILLS.map(p =>
    el('button', { class: p.key === S.ui.view ? 'active' : '', onclick: () => {
      S.ui.view = p.key;
      Composer.render();
      render();
    } }, p.label, (p.key === 'followups' && overdue > 0) ? el('span', { class: 'dot' }) : null)));

  // filter pills (hidden in radar — no done state there)
  const fp = $('filterPills');
  fp.style.visibility = S.ui.view === 'radar' ? 'hidden' : '';
  fp.innerHTML = '';
  fp.append(...FILTER_PILLS.map(p =>
    el('button', { class: p.key === S.ui.filter ? 'active' : '',
      onclick: () => { S.ui.filter = p.key; render(); } }, p.label)));

  // header count line
  const scoped = S.data.tasks.filter(inScope);
  const remaining = scoped.filter(t => !t.done).length;
  const doNow = scoped.filter(t => !t.done && t.urgent && t.important).length;
  const count = $('count');
  count.innerHTML = '';
  if (scoped.length > 0) {
    count.append(remaining === 0 ? 'All done' :
      remaining + (remaining === 1 ? ' task remaining' : ' tasks remaining') +
      (doNow > 0 ? ' \u00b7 ' + doNow + ' to do now' : ''));
    if (overdue > 0) count.append(el('span', { class: 'overdue-note', text: ' \u00b7 ' + overdue + ' overdue' }));
  }
}

function renderStatus() {
  const s = $('storageStatus');
  if (!s) return;
  $('dbxBtn').hidden = !!Store.refreshToken;
  $('dbxDisconnect').hidden = !Store.refreshToken;

  const counts = S.data.tasks.length + ' tasks, ' + S.data.radar.length + ' radar items';
  if (Store.refreshToken) {
    if (Store.state === 'syncing') s.textContent = 'Syncing with Dropbox\u2026';
    else if (Store.state === 'error') s.textContent = '\u26a0 Dropbox sync failed \u2014 data is safe on this device and will retry on your next change';
    else s.textContent = 'Synced with Dropbox' +
      (Store.lastSyncAt ? ' at ' + Store.lastSyncAt.toTimeString().slice(0, 5) : '') + ' \u00b7 ' + counts;
  } else if (Store.localOk) {
    s.textContent = 'Saved on this device only \u00b7 ' + counts;
  } else {
    s.textContent = 'Auto-save unavailable here \u2014 host this file and open it in a browser';
  }
}

function renderEmpty() {
  const e = $('emptyMsg');
  let show = false, msg = '';
  if (S.ui.view === 'radar') {
    show = S.data.radar.filter(inScope).length === 0;
    msg = 'Nothing on your radar yet. Add something above \u2014 no date needed.';
  } else if (S.ui.view !== 'followups') {
    show = visibleTasks().length === 0;
    const scopeName = S.ui.scope === 'both' ? '' : S.ui.scope + ' ';
    msg = S.data.tasks.filter(inScope).length === 0
      ? 'No ' + scopeName + 'tasks yet. Add your first above.'
      : S.ui.filter === 'done'
        ? 'No completed ' + scopeName + 'tasks yet.'
        : 'No active ' + scopeName + 'tasks \u2014 nice work.';
  }
  e.hidden = !show;
  if (show) e.textContent = msg;
}

/** The one render: shell + active view + empty state + persist. */
function render() {
  renderShell();
  const host = $('viewHost');
  host.innerHTML = '';
  host.append(Views[S.ui.view]());
  renderEmpty();
  Store.save();
}

/* =========================================================================
   11. WIRING & BOOT
   ========================================================================= */
function wire() {
  $('addBtn').addEventListener('click', Composer.add);
  $('input').addEventListener('keydown', e => { if (e.key === 'Enter') Composer.add(); });

  document.querySelectorAll('#scope button').forEach(b =>
    b.addEventListener('click', () => {
      S.ui.scope = b.dataset.scope;
      if (S.ui.scope !== 'both') Composer.setContext(S.ui.scope);
      render();
    }));

  $('dbxBtn').addEventListener('click', () => {
    if (!Store.appKey) {
      $('dbxSetup').hidden = false;
      $('dbxKeyInput').focus();
    } else Store.startAuth();
  });

  $('dbxKeySave').addEventListener('click', () => {
    const key = $('dbxKeyInput').value.trim();
    if (!key) return;
    Store.appKey = key;
    $('dbxSetup').hidden = true;
    Store.startAuth();
  });

  $('dbxDisconnect').addEventListener('click', () => Store.disconnect());

  $('exportBtn').addEventListener('click', () => {
    const blob = new Blob([Store.serialize()], { type: 'application/json' });
    const a = el('a', { href: URL.createObjectURL(blob), download: 'tasks-backup-' + Cal.today() + '.json' });
    a.click();
    URL.revokeObjectURL(a.href);
  });

  $('importBtn').addEventListener('click', () => $('importFile').click());

  $('importFile').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (!Array.isArray(data.tasks) || !Array.isArray(data.radar)) throw new Error('bad shape');
        migrate(data);
        render();
      } catch (err) {
        alert('That file doesn\u2019t look like a backup from this app.');
      }
      e.target.value = '';
    };
    reader.readAsText(file);
  });

  // Flush pending uploads when leaving; keep countdowns fresh once a minute,
  // but never re-render out from under an open editor, drag, or keyboard.
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden') Store.flush();
  });

  setInterval(() => {
    const typing = document.activeElement && ['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName);
    const busy = Drag.active || S.ui.openDateEditor !== null || S.ui.openCheckin !== null ||
                 S.ui.openEdit !== null || typing;
    if (!busy && document.visibilityState === 'visible') render();
  }, 60000);
}

(async function boot() {
  Store.loadLocal();                       // instant start from cache
  wire();
  Composer.render();
  render();
  await Store.finishAuth();                // returning from Dropbox consent?
  if (Store.refreshToken) {
    Store.state = 'connected';
    await Store.syncDown();                // Dropbox copy wins over cache
    render();
  }
})();
</script>
</body>
</html>
